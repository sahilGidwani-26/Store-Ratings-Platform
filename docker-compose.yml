# Optional: spins up a local PostgreSQL instance for the backend.
# Run: docker-compose up -d
# Then in backend/.env set DB_DIALECT=postgres, DB_HOST=localhost, DB_PORT=5432,
# DB_NAME=store_ratings, DB_USER=postgres, DB_PASSWORD=postgres
version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: store_ratings
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata:
